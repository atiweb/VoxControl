<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>VoxControl</title>
  <style>
    :root {
      --bg: #0f0f1a;
      --surface: #1a1a2e;
      --primary: #6c63ff;
      --primary-light: #8b84ff;
      --accent: #00d4aa;
      --danger: #ff4757;
      --text: #e8e8f0;
      --text-muted: #8888aa;
      --border: #2a2a4a;
      --listening: #ff6b6b;
      --success: #2ed573;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
    }

    /* ---- HEADER ---- */
    header {
      padding: 1.2rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary-light), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--danger);
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--success); }

    /* ---- LOG ---- */
    #log {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .msg {
      padding: 0.6rem 1rem;
      border-radius: 14px;
      max-width: 88%;
      font-size: 0.93rem;
      line-height: 1.4;
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform: translateY(6px); } to { opacity:1; transform: none; } }

    .msg.user {
      align-self: flex-end;
      background: var(--primary);
      color: #fff;
      border-bottom-right-radius: 4px;
    }

    .msg.pc {
      align-self: flex-start;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    .msg.system {
      align-self: center;
      font-size: 0.8rem;
      color: var(--text-muted);
      background: transparent;
    }

    /* ---- MIC BUTTON ---- */
    #mic-section {
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }

    #mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s, background 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    }

    #mic-btn:active { transform: scale(0.93); }

    #mic-btn.listening {
      background: var(--listening);
      box-shadow: 0 0 0 0 rgba(255,107,107,0.6);
      animation: pulse 1s infinite;
    }

    #mic-btn.processing {
      background: var(--accent);
      animation: spin 0.8s linear infinite;
    }

    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(255,107,107,0.6); }
      70%  { box-shadow: 0 0 0 20px rgba(255,107,107,0); }
      100% { box-shadow: 0 0 0 0 rgba(255,107,107,0); }
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    #mic-btn svg { width: 32px; height: 32px; fill: #fff; }

    #mic-status {
      font-size: 0.85rem;
      color: var(--text-muted);
      text-align: center;
    }

    /* ---- TEXT INPUT ---- */
    #text-form {
      display: flex;
      width: 100%;
      gap: 0.5rem;
    }

    #text-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 24px;
      padding: 0.65rem 1.1rem;
      font-size: 0.9rem;
      outline: none;
      transition: border 0.2s;
    }
    #text-input:focus { border-color: var(--primary); }
    #text-input::placeholder { color: var(--text-muted); }

    #send-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--primary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    #send-btn svg { width: 20px; height: 20px; fill: #fff; }

    /* ---- QUICK COMMANDS ---- */
    #quick-cmds {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      width: 100%;
    }

    .quick-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 16px;
      padding: 0.3rem 0.8rem;
      font-size: 0.78rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border 0.15s;
      white-space: nowrap;
    }
    .quick-btn:active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
    }
  </style>
</head>
<body>

<header>
  <h1>VoxControl</h1>
  <div id="status-dot"></div>
</header>

<div id="log">
  <div class="msg system" id="initial-msg">Connecting...</div>
</div>

<section id="mic-section">
  <!-- Quick commands -->
  <div id="quick-cmds">
    <button class="quick-btn" data-cmd-key="qc_chrome">Chrome</button>
    <button class="quick-btn" data-cmd-key="qc_whatsapp">WhatsApp</button>
    <button class="quick-btn" data-cmd-key="qc_screenshot">Print</button>
    <button class="quick-btn" data-cmd="play pause">&#9654;/&#9208;</button>
    <button class="quick-btn" data-cmd-key="qc_vol_up">Vol +</button>
    <button class="quick-btn" data-cmd-key="qc_vol_down">Vol -</button>
    <button class="quick-btn" data-cmd-key="qc_minimize">Min</button>
    <button class="quick-btn" data-cmd-key="qc_lock">Lock</button>
  </div>

  <!-- Text input -->
  <form id="text-form">
    <input type="text" id="text-input" placeholder="Type a command..." autocomplete="off" />
    <button type="submit" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </form>

  <!-- Mic button -->
  <button id="mic-btn" aria-label="Hold to speak">
    <svg id="mic-icon" viewBox="0 0 24 24">
      <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5.91-3c-.49 0-.9.36-.98.85C16.52 14.2 14.47 16 12 16s-4.52-1.8-4.93-4.15c-.08-.49-.49-.85-.98-.85-.61 0-1.09.54-1 1.14.49 3 2.89 5.35 5.91 5.78V20c0 .55.45 1 1 1s1-.45 1-1v-2.08c3.02-.43 5.42-2.78 5.91-5.78.1-.6-.39-1.14-1-1.14z"/>
    </svg>
  </button>
  <p id="mic-status">Hold button to speak</p>
</section>

<script>
  // ---- CONFIG ----
  const WS_URL = `ws${location.protocol === 'https:' ? 's' : ''}://${location.host}/ws`;

  // ---- I18N (defaults, overridden by server config) ----
  let I18N = {
    language: 'pt-BR',
    connecting: 'Connecting...',
    connected: 'Connected.',
    disconnected: 'Disconnected. Reconnecting...',
    connection_error: 'Connection error.',
    no_connection: 'No connection.',
    mic_error: 'Could not access microphone.',
    hold_to_speak: 'Hold button to speak',
    listening: 'Listening... release to send',
    processing: 'Processing...',
    placeholder: 'Type a command...',
    qc_chrome: 'open chrome',
    qc_whatsapp: 'open whatsapp',
    qc_screenshot: 'take screenshot',
    qc_vol_up: 'volume up',
    qc_vol_down: 'volume down',
    qc_minimize: 'minimize',
    qc_lock: 'lock screen',
  };

  function applyI18N(config) {
    I18N = { ...I18N, ...config };

    // Update placeholder
    document.getElementById('text-input').placeholder = I18N.placeholder;

    // Update mic status
    if (!isListening) {
      document.getElementById('mic-status').textContent = I18N.hold_to_speak;
    }

    // Update initial message
    const initMsg = document.getElementById('initial-msg');
    if (initMsg) initMsg.textContent = I18N.connecting;

    // Update quick command data-cmd values
    document.querySelectorAll('.quick-btn[data-cmd-key]').forEach(btn => {
      const key = btn.dataset.cmdKey;
      if (I18N[key]) {
        btn.dataset.cmd = I18N[key];
      }
    });

    // Update SpeechRecognition language
    if (speechRecognition) {
      speechRecognition.lang = I18N.language;
    }
  }

  // ---- STATE ----
  let ws = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let isListening = false;
  let speechRecognition = null;
  let reconnectTimer = null;
  let hasSpeechAPI = 'SpeechRecognition' in window || 'webkitSpeechRecognition' in window;

  // ---- DOM ----
  const log = document.getElementById('log');
  const micBtn = document.getElementById('mic-btn');
  const micStatus = document.getElementById('mic-status');
  const statusDot = document.getElementById('status-dot');
  const textInput = document.getElementById('text-input');
  const textForm = document.getElementById('text-form');

  // ---- UTILS ----
  function addMsg(text, type = 'pc') {
    const div = document.createElement('div');
    div.className = `msg ${type}`;
    div.textContent = text;
    log.appendChild(div);
    log.scrollTop = log.scrollHeight;
  }

  function setMicState(state) {
    micBtn.className = state;
    const labels = {
      '': I18N.hold_to_speak,
      listening: I18N.listening,
      processing: I18N.processing,
    };
    micStatus.textContent = labels[state] || labels[''];
  }

  // ---- WEBSOCKET ----
  function connect() {
    if (ws && ws.readyState === WebSocket.OPEN) return;
    ws = new WebSocket(WS_URL);

    ws.onopen = () => {
      statusDot.classList.add('connected');
      clearTimeout(reconnectTimer);
    };

    ws.onclose = () => {
      statusDot.classList.remove('connected');
      addMsg(I18N.disconnected, 'system');
      reconnectTimer = setTimeout(connect, 3000);
    };

    ws.onerror = () => {
      addMsg(I18N.connection_error, 'system');
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);
      if (msg.type === 'config') {
        // Server sends language config
        applyI18N(msg.data);
      } else if (msg.type === 'status') {
        if (msg.data === 'connected') {
          addMsg(I18N.connected, 'system');
        }
      } else if (msg.type === 'response' || msg.type === 'broadcast') {
        addMsg(msg.data, 'pc');
        setMicState('');
      }
    };
  }

  function sendText(text) {
    if (!ws || ws.readyState !== WebSocket.OPEN) {
      addMsg(I18N.no_connection, 'system');
      return;
    }
    addMsg(text, 'user');
    ws.send(JSON.stringify({ type: 'text', data: text }));
    setMicState('processing');
  }

  // ---- TEXT FORM ----
  textForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const text = textInput.value.trim();
    if (text) {
      sendText(text);
      textInput.value = '';
    }
  });

  // ---- QUICK COMMANDS ----
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      const cmd = btn.dataset.cmd || btn.dataset.cmdKey;
      if (cmd) sendText(cmd);
    });
  });

  // ---- MIC -- Web Speech API (best for mobile with HTTPS) ----
  function setupSpeechRecognition() {
    const SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRec) return false;

    speechRecognition = new SpeechRec();
    speechRecognition.lang = I18N.language;
    speechRecognition.continuous = false;
    speechRecognition.interimResults = false;

    speechRecognition.onresult = (event) => {
      const transcript = event.results[0][0].transcript;
      sendText(transcript);
    };

    speechRecognition.onerror = (event) => {
      addMsg(`${I18N.mic_error}: ${event.error}`, 'system');
      setMicState('');
      isListening = false;
    };

    speechRecognition.onend = () => {
      if (isListening) {
        setMicState('processing');
        isListening = false;
      }
    };

    return true;
  }

  // ---- MIC -- MediaRecorder fallback (PCM for server) ----
  async function startMediaRecorder() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];

      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);

      mediaRecorder.onstop = async () => {
        const blob = new Blob(audioChunks, { type: 'audio/webm' });
        const reader = new FileReader();
        reader.onloadend = () => {
          const base64 = reader.result.split(',')[1];
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'audio_b64', data: base64 }));
            setMicState('processing');
          }
        };
        reader.readAsDataURL(blob);
        isListening = false;
      };

      mediaRecorder.start();
      setMicState('listening');
      isListening = true;
      return true;
    } catch (err) {
      addMsg(I18N.mic_error, 'system');
      return false;
    }
  }

  // ---- MIC BUTTON EVENTS ----
  const useSpeechAPI = setupSpeechRecognition();

  micBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (isListening) return;
    isListening = true;
    setMicState('listening');

    if (useSpeechAPI) {
      try { speechRecognition.start(); } catch(e) {}
    } else {
      startMediaRecorder();
    }
  }, { passive: false });

  micBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (!isListening) return;
    if (useSpeechAPI) {
      try { speechRecognition.stop(); } catch(e) {}
    } else if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }, { passive: false });

  // Click for desktop
  micBtn.addEventListener('click', () => {
    if (isListening) {
      if (useSpeechAPI) { try { speechRecognition.stop(); } catch(e) {} }
      else if (mediaRecorder && mediaRecorder.state === 'recording') { mediaRecorder.stop(); }
      isListening = false;
      setMicState('');
    } else {
      isListening = true;
      setMicState('listening');
      if (useSpeechAPI) {
        try { speechRecognition.start(); } catch(e) {}
      } else {
        startMediaRecorder();
      }
    }
  });

  // ---- INIT ----
  connect();
</script>
</body>
</html>
