name: voxcontrol
description: VoxControl - Voice control for your PC from your phone.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.0
  web_socket_channel: ^3.0.0
  shared_preferences: ^2.2.2
  permission_handler: ^11.3.0
  record: ^5.1.0
  provider: ^6.1.1
  flutter_secure_storage: ^9.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - assets/icons/

  fonts:
    - family: VoxIcons
      fonts:
        - asset: assets/fonts/VoxIcons.ttf
