# ============================================================
# VoxControl -- general settings
# ============================================================

app:
  name: "VoxControl"
  version: "1.1.0"
  # Language: pt-BR | pt-PT | es-ES | es-MX | en-US | en-GB
  # Also accepts short codes: pt | es | en
  language: "pt-BR"

audio:
  sample_rate: 16000
  channels: 1
  chunk_duration_ms: 30      # for VAD
  # Microphone device: null = system default
  input_device: null
  # Silence to end capture (seconds)
  silence_timeout: 1.5
  # Minimum volume to detect speech (0.0 - 1.0)
  min_speech_energy: 0.01

stt:
  # "faster-whisper" | "vosk"
  engine: "faster-whisper"
  whisper:
    model_size: "small"      # tiny | base | small | medium | large-v3
    # Language: auto-set based on app.language (pt, es, en)
    # Override here only if needed
    language: "pt"
    device: "auto"           # auto | cpu | cuda
    compute_type: "int8"     # int8 | float16 | float32
    beam_size: 5
    vad_filter: true
  vosk:
    model_path: "models/vosk-model-pt"

wake_word:
  enabled: true
  # Wake word: auto-set based on app.language
  # pt: "computador" | es: "computadora" | en: "computer"
  # Override here to use a custom wake word
  word: "computador"
  # Alternative triggers (accent variations)
  aliases:
    - "computado"
    - "ei computador"
    - "oi computador"
  # Detection sensitivity (0.0 - 1.0)
  sensitivity: 0.7
  listen_timeout: 6          # seconds after wake word

ai:
  # "claude" | "openai" | "offline"
  backend: "claude"
  fallback: "openai"         # used if primary fails
  claude:
    model: "claude-haiku-4-5-20251001"
    max_tokens: 512
    temperature: 0.1
  openai:
    model: "gpt-4o-mini"
    max_tokens: 512
    temperature: 0.1
  # Minimum confidence to execute without confirmation
  min_confidence: 0.6
  # Confirm risky actions by voice
  confirm_risky_actions: true

voice_response:
  enabled: true
  # Speech rate (words per minute)
  rate: 180
  # Volume (0.0 - 1.0)
  volume: 0.9
  # Prefer female voice
  prefer_female: true

browser:
  default: "chrome"          # chrome | edge | firefox
  chrome_path: null          # null = auto-detect
  edge_path: null
  firefox_path: null

office:
  # true = use COM API (more reliable), false = use keyboard shortcuts
  use_com_api: true
  confirm_before_delete: true

remote:
  enabled: true
  host: "0.0.0.0"
  port: 8765
  # Show QR code on startup
  show_qr: true
  # Basic auth (leave empty to disable)
  auth_token: ""

logging:
  level: "INFO"              # DEBUG | INFO | WARNING | ERROR
  file: "logs/voxcontrol.log"
  max_bytes: 5242880         # 5 MB
  backup_count: 3
