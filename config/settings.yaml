ai:
  backend: claude
  claude:
    max_tokens: 512
    model: claude-haiku-4-5-20251001
    temperature: 0.1
  confirm_risky_actions: true
  fallback: openai
  min_confidence: 0.6
  openai:
    max_tokens: 512
    model: gpt-4o-mini
    temperature: 0.1
app:
  language: pt-BR
  name: VoxControl
  version: 1.1.0
audio:
  channels: 1
  chunk_duration_ms: 30
  input_device: null
  min_speech_energy: 0.01
  sample_rate: 16000
  silence_timeout: 1.5
browser:
  chrome_path: null
  default: chrome
  edge_path: null
  firefox_path: null
logging:
  backup_count: 3
  file: logs/voxcontrol.log
  level: INFO
  max_bytes: 5242880
office:
  confirm_before_delete: true
  use_com_api: true
remote:
  auth:
    credentials_file: config/credentials.json
    enabled: true
    token_expiry: 86400
  enabled: true
  host: 0.0.0.0
  port: 8765
  rate_limit:
    max_requests: 60
    window_seconds: 60
  show_qr: true
  ssl_certfile: ''
  ssl_keyfile: ''
stt:
  engine: faster-whisper
  vosk:
    model_path: models/vosk-model-pt
  whisper:
    beam_size: 5
    compute_type: int8
    device: cpu
    language: pt
    model_size: small
    vad_filter: true
voice_response:
  enabled: true
  prefer_female: true
  rate: 180
  volume: 0.9
wake_word:
  aliases:
  - computado
  - ei computador
  - oi computador
  enabled: true
  listen_timeout: 6
  sensitivity: 0.7
  word: computador
